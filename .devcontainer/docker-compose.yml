services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/workspace.Dockerfile
    working_dir: /workspaces/stock-screening-boost
    volumes:
      - ..:/workspaces/stock-screening-boost
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/stock-screening-boost
      REDIS_URL: redis://redis:6379
      PYTHON_SERVICE_URL: http://127.0.0.1:8000
      PYTHON_INTELLIGENCE_SERVICE_URL: http://127.0.0.1:8000
      PYTHON_SERVICE_TIMEOUT_MS: "60000"
      PYTHON_INTELLIGENCE_SERVICE_TIMEOUT_MS: "300000"
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "8000:8000"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock-screening-boost
    ports:
      - "5432:5432"
    volumes:
      - devcontainer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d stock-screening-boost"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - devcontainer_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  devcontainer_postgres_data:
  devcontainer_redis_data:
